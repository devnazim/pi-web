<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, interactive-widget=resizes-content" />
    <link rel="icon" type="image/svg+xml" href="%BASE_URL%favicon.svg" />
    <meta name="theme-color" content="#ffffff" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#1b1b1b" media="(prefers-color-scheme: dark)" />
    <title>Pi Web</title>
    <script>
      window.__PI_WEB_BASE_PATH__ = '/';
    </script>
    <script>
      (() => {
        const systemTheme = () => window.matchMedia?.('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
        let theme = systemTheme();

        try {
          const stored = localStorage.getItem('pi-web-theme-preference');
          if (stored === 'dark' || stored === 'light') theme = stored;

          const storedTitle = localStorage.getItem('pi-web-browser-tab-name')?.replace(/[\r\n\t]+/g, ' ').trim().slice(0, 80);
          if (storedTitle) document.title = storedTitle;
        } catch {
          // Keep defaults if storage is unavailable.
        }

        document.documentElement.dataset.theme = theme;
        document.documentElement.classList.toggle('dark', theme === 'dark');
      })();
    </script>
    <style>
      html {
        background: #ffffff;
        background: oklch(1 0 0);
        color-scheme: light;
      }

      html.dark,
      html[data-theme='dark'] {
        background: #1b1b1b;
        background: oklch(0.16 0 0);
        color-scheme: dark;
      }

      html,
      body,
      #root {
        height: 100%;
        min-height: 0;
        overflow: hidden;
      }

      body {
        margin: 0;
        background: inherit;
      }

      #root {
        height: 100vh;
        height: 100dvh;
        height: var(--pi-app-viewport-height, 100dvh);
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
